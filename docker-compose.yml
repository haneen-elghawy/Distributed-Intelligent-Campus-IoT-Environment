version: "3.9"

networks:
  campus-net:
    driver: bridge

volumes:
  hivemq_data:
  thingsboard_data:
  thingsboard_logs:
  sim_data:

services:

  # ─── HiveMQ Backbone Broker ──────────────────────────────────────────────
  hivemq:
    image: hivemq/hivemq-ce:latest
    container_name: campus-hivemq
    hostname: hivemq
    ports:
      - "1883:1883"   # MQTT plain (internal dev)
      - "8883:8883"   # MQTT TLS
      - "8080:8080"   # HiveMQ Control Center UI
    volumes:
      - ./hivemq/config:/opt/hivemq/conf
      - ./hivemq/extensions:/opt/hivemq/extensions
      - ./hivemq/certs:/opt/hivemq/certs
      - hivemq_data:/opt/hivemq/data
    networks:
      - campus-net
    restart: unless-stopped

  # ─── ThingsBoard Cloud Layer ─────────────────────────────────────────────
  thingsboard:
    image: thingsboard/tb-postgres:latest
    container_name: campus-thingsboard
    hostname: thingsboard
    ports:
      - "9090:9090"    # ThingsBoard Web UI
      - "1884:1883"    # TB internal MQTT (mapped to host 1884 to avoid conflict)
      # Host 15683: container 5683 — avoids conflict with sim-engine UDP 5683–5782
      - "15683:5683/udp"
    environment:
      TB_QUEUE_TYPE: in-memory
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/thingsboard
    volumes:
      - thingsboard_data:/data
      - thingsboard_logs:/var/log/thingsboard
    networks:
      - campus-net
    restart: unless-stopped

  # ─── Python World Engine ─────────────────────────────────────────────────
  sim-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-sim-engine
    hostname: sim-engine
    env_file: .env
    environment:
      HIVEMQ_BROKER: hivemq
      HIVEMQ_PORT_PLAIN: 1883
    volumes:
      - sim_data:/app/data
      - ./hivemq/certs:/app/hivemq/certs:ro
    networks:
      - campus-net
    depends_on:
      - hivemq
    command: python -m src
    restart: unless-stopped
    # Expose CoAP UDP ports for all 100 CoAP rooms (5683-5782)
    ports:
      - "5683-5782:5683-5782/udp"

  # ─── Floor Gateways (Node-RED) ───────────────────────────────────────────
  gateway-f01:
    image: nodered/node-red:latest
    container_name: campus-gateway-f01
    hostname: gateway-f01
    environment:
      FLOOR: "01"
      HIVEMQ_HOST: hivemq
      HIVEMQ_PORT: 1883
      SIM_ENGINE_HOST: sim-engine
      COAP_PORT_START: "5683"
      MQTT_USER: floor01
      MQTT_PASS: floor01pass
      FLOWS: flows.json
    volumes:
      - ./node-red/gateway-f01:/data
    networks:
      - campus-net
    depends_on:
      - hivemq
      - sim-engine
    restart: unless-stopped

